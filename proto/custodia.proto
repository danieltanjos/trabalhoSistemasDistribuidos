syntax = "proto3";

package custodia;

option java_multiple_files = true;
option java_package = "br.senai.custodia.grpc";

service CustodiaService {
  rpc ValidarOrdem(ValidarOrdemRequest) returns (ValidarOrdemResponse);
  rpc LiquidarOperacao(LiquidacaoRequest) returns (LiquidacaoResponse);
  rpc AcompanharSaldos(AssinaturaBrokerRequest) returns (stream SaldoUpdate);
}

message ValidarOrdemRequest {
  string investidor = 1;
  string ativo = 2;
  string lado = 3;
  double preco = 4;
  int32 quantidade = 5;
}

message ValidarOrdemResponse {
  bool aprovado = 1;
  string motivo = 2;
}

message LiquidacaoRequest {
  string comprador = 1;
  string vendedor = 2;
  string ativo = 3;
  double preco = 4;
  int32 quantidade = 5;
}

message LiquidacaoResponse {
  bool sucesso = 1;
  string mensagem = 2;
}

message AssinaturaBrokerRequest {
  string broker_id = 1;
}

message SaldoUpdate {
  string investidor = 1;
  string ativo = 2;
  double saldo_financeiro = 3;
  int32 saldo_ativo = 4;
  string descricao = 5;
}
